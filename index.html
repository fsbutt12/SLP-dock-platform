<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLP Security - Multi-Scan Dock Platform</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(21, 28, 44, 0.85); /* Semi-transparent to let background peek through */
            --accent-color: #f59e0b; 
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: rgba(30, 41, 59, 0.8);
            --success-color: #10b981;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: var(--bg-color);
            /* Updated to use your new background image with a gradient overlay */
            background-image: linear-gradient(rgba(11, 15, 25, 0.85), rgba(11, 15, 25, 0.85)), url('https://fsbutt12.github.io/SLP-dock-platform/background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-main);
            padding: 2rem;
        }
        header {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(21, 28, 44, 0.6);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            backdrop-filter: blur(8px);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        /* Style for your company logo */
        .company-logo {
            height: 45px;
            width: auto;
            object-fit: contain;
            border-radius: 6px;
        }
        header h1 {
            font-size: 1.5rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        header h1 span {
            color: var(--accent-color);
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }
        @media (max-width: 900px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(8px);
        }
        .card h2 {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .metrics-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            grid-column: 1 / -1;
            margin-bottom: 1.5rem;
        }
        .metric-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--accent-color);
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
            backdrop-filter: blur(8px);
        }
        .metric-card .num {
            font-size: 2rem;
            font-weight: bold;
            color: var(--text-main);
        }
        .metric-card .label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-top: 5px;
        }
        .scanners-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .scan-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed rgba(245, 158, 11, 0.4);
            border-radius: 8px;
            padding: 0.75rem;
            text-align: center;
            transition: all 0.2s;
        }
        .scan-box:hover {
            border-color: var(--accent-color);
            background: rgba(245, 158, 11, 0.05);
        }
        .scan-box label {
            display: block;
            cursor: pointer;
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.85rem;
        }
        .scan-box label span {
            color: var(--accent-color);
        }
        .scan-status {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }
        .form-group input, .form-group select {
            width: 100%;
            background-color: rgba(11, 15, 25, 0.6);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border 0.2s;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: var(--accent-color);
        }
        button {
            width: 100%;
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 0.75rem;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        button:hover { opacity: 0.9; }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }
        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
        }
        tr:hover td { background-color: rgba(255,255,255,0.04); }
        .badge {
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .badge.in { background-color: rgba(16, 185, 129, 0.2); color: var(--success-color); }
        .badge.out { background-color: rgba(239, 68, 68, 0.2); color: #ef4444; }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <img class="company-logo" src="https://fsbutt12.github.io/SLP-dock-platform/logo.jpg" alt="Logo">
            <h1>SLP <span>Security Platform</span></h1>
        </div>
        <div style="color: var(--text-muted); font-size: 0.9rem;">Status: <span style="color: var(--success-color)">● Dashboard Active</span></div>
    </header>
    <div class="metrics-bar">
        <div class="metric-card">
            <div class="num" id="metric-total">0</div>
            <div class="label">Total Check-Ins</div>
        </div>
        <div class="metric-card" style="border-left-color: #10b981;">
            <div class="num" id="metric-inbound">0</div>
            <div class="label">Active Inbound</div>
        </div>
        <div class="metric-card" style="border-left-color: #3b82f6;">
            <div class="num" id="metric-docks">0</div>
            <div class="label">Docks Utilized</div>
        </div>
    </div>
    <div class="dashboard-grid">
        <div class="card">
            <h2>Truck Entry Form</h2>
            <div class="scanners-container">
                <div class="scan-box">
                    <label for="iqamaScanner">🪪 SCAN DRIVER <span>IQAMA</span> (NAME ONLY)</label>
                    <input type="file" id="iqamaScanner" accept="image/*" style="display: none;">
                    <div class="scan-status" id="iqamaStatus">Ready to scan driver card</div>
                </div>
                <div class="scan-box">
                    <label for="plateScanner">🚘 SCAN VEHICLE <span>PLATE NUMBER</span></label>
                    <input type="file" id="plateScanner" accept="image/*" style="display: none;">
                    <div class="scan-status" id="plateStatus">Ready to scan back bumper plate</div>
                </div>
                <div class="scan-box">
                    <label for="officerScanner">🛡️ SCAN OFFICER <span>BADGE ID</span></label>
                    <input type="file" id="officerScanner" accept="image/*" style="display: none;">
                    <div class="scan-status" id="officerStatus">Ready to scan staff badge</div>
                </div>
            </div>
            <form id="entryForm">
                <div class="form-group">
                    <label>Driver Name</label>
                    <input type="text" id="driverName" required placeholder="Awaiting Iqama scan or manual entry">
                </div>
                <div class="form-group">
                    <label>Plate Number</label>
                    <input type="text" id="plateNumber" required placeholder="Awaiting plate scan or manual entry">
                </div>
                <div class="form-group">
                    <label>Security Officer ID</label>
                    <input type="text" id="securityName" required placeholder="Awaiting badge scan or manual entry">
                </div>
                <div class="form-group">
                    <label>Dock Assignment</label>
                    <select id="dockNumber">
                        <option value="Dock 1">Dock 1</option>
                        <option value="Dock 2">Dock 2</option>
                        <option value="Dock 3">Dock 3</option>
                        <option value="Dock 4">Dock 4</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Direction</label>
                    <select id="direction">
                        <option value="Inbound">Inbound (Check-In)</option>
                        <option value="Outbound">Outbound (Check-Out)</option>
                    </select>
                </div>
                <button type="submit" id="submitBtn">Submit Log</button>
            </form>
        </div>
        <div class="card" style="overflow-x: auto;">
            <h2>Live Activity Feed</h2>
            <table>
                <thead>
                    <tr>
                        <th>Driver</th>
                        <th>Plate</th>
                        <th>Dock</th>
                        <th>Direction</th>
                        <th>Officer ID</th>
                    </tr>
                </thead>
                <tbody id="liveFeedBody">
                    <tr>
                        <td colspan="5" style="text-align: center; color: var(--text-muted);">Loading logs...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx5hQYr4uvmEhds13c1-WonqNzRut1Ksj52vjH7ncX5uo3Hqis2nAcHDQD0wxE2Eqo9zQ/exec";

        document.getElementById('iqamaScanner').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const status = document.getElementById('iqamaStatus');
            status.innerHTML = "🌀 Processing Iqama locally...";
            status.style.color = "var(--accent-color)";
            Tesseract.recognize(file, 'eng').then(({ data: { text } }) => {
                status.innerHTML = "✅ Scan complete!";
                status.style.color = "var(--success-color)";
                const lines = text.split('\n');
                let extractedName = "";
                for (let line of lines) {
                    let cleaned = line.trim().toUpperCase();
                    if (/KINGDOM|SAUDI|ARABIA|MINISTRY|INTERIOR|RESIDENCE|PERMIT|IDENTITY|NUMBER|DATE/i.test(cleaned)) {
                        continue;
                    }
                    const nameMatch = cleaned.match(/\b[A-Z\s]{12,}\b/);
                    if (nameMatch) {
                        extractedName = nameMatch[0].trim();
                        break; 
                    }
                }
                if (extractedName) {
                    document.getElementById('driverName').value = extractedName;
                } else {
                    status.innerHTML = "⚠️ Name line not found. Try a closer view.";
                    status.style.color = "var(--accent-color)";
                }
            }).catch(err => {
                status.innerHTML = "❌ Scanner Processing Failure.";
                status.style.color = "#ef4444";
            });
        });

        document.getElementById('plateScanner').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const status = document.getElementById('plateStatus');
            status.innerHTML = "🌀 Isolating plate elements...";
            status.style.color = "var(--accent-color)";
            Tesseract.recognize(file, 'eng').then(({ data: { text } }) => {
                status.innerHTML = "✅ Scan complete!";
                status.style.color = "var(--success-color)";
                const lines = text.split('\n');
                let digits = "";
                let letters = "";
                lines.forEach(line => {
                    let cleaned = line.replace(/[^A-Z0-9\s]/gi, '').toUpperCase().trim();
                    if (/OPENSOUQ|ELANTRA|HYUNDAI|KSA|SAUDI/i.test(cleaned)) return;
                    if (/^\d{3,4}$/.test(cleaned)) {
                        digits = cleaned;
                    } else if (/^[A-Z]{3}$/.test(cleaned)) {
                        letters = cleaned;
                    }
                });
                if (!digits || !letters) {
                    const words = text.split(/\s+/);
                    words.forEach(word => {
                        let cleanWord = word.replace(/[^A-Z0-9]/gi, '').toUpperCase();
                        if (/^\d{4}$/.test(cleanWord)) digits = cleanWord;
                        if (/^[A-Z]{3}$/.test(cleanWord) && !/KSA/i.test(cleanWord)) letters = cleanWord;
                    });
                }
                if (digits || letters) {
                    document.getElementById('plateNumber').value = (digits + " " + letters).trim();
                } else {
                    status.innerHTML = "⚠️ Bumper markers blurred. Re-snap.";
                    status.style.color = "var(--accent-color)";
                }
            }).catch(() => {
                status.innerHTML = "❌ Error processing layout.";
                status.style.color = "#ef4444";
            });
        });

        document.getElementById('officerScanner').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const status = document.getElementById('officerStatus');
            status.innerHTML = "🌀 Locating ID code...";
            status.style.color = "var(--accent-color)";
            Tesseract.recognize(file, 'eng').then(({ data: { text } }) => {
                status.innerHTML = "✅ Scan complete!";
                status.style.color = "var(--success-color)";
                const badgeMatch = text.match(/LP\d+/i) || text.match(/[A-Z]{2}\d{4}\b/i);
                if (badgeMatch) {
                    document.getElementById('securityName').value = badgeMatch[0].replace('#', '').toUpperCase();
                } else {
                    const words = text.split(/\s+/);
                    let fallback = "";
                    for(let w of words) {
                        let clean = w.replace(/[^A-Z0-9]/gi, '');
                        if(clean.length >= 5 && /[0-9]/.test(clean)) {
                            fallback = clean.toUpperCase();
                            break;
                        }
                    }
                    if(fallback) {
                        document.getElementById('securityName').value = fallback;
                    } else {
                        status.innerHTML = "⚠️ Badging strings unread. Hold steady.";
                        status.style.color = "var(--accent-color)";
                    }
                }
            }).catch(() => {
                status.innerHTML = "❌ System fault scanning card.";
                status.style.color = "#ef4444";
            });
        });

        window.handleLogsResponse = function(data) {
            const tbody = document.getElementById('liveFeedBody');
            tbody.innerHTML = ''; 
            
            if(!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: var(--text-muted);">No entries recorded today.</td></tr>';
                return;
            }
            document.getElementById('metric-total').innerText = data.length;
            let inboundCount = data.filter(item => item.direction === 'Inbound').length;
            document.getElementById('metric-inbound').innerText = inboundCount;
            let uniqueDocks = [...new Set(data.map(item => item.dockNumber))].length;
            document.getElementById('metric-docks').innerText = uniqueDocks;
            data.reverse().forEach(row => {
                const tr = document.createElement('tr');
                const badgeClass = row.direction.toLowerCase() === 'inbound' ? 'in' : 'out';
                tr.innerHTML = '<td><strong>' + row.driverName + '</strong></td><td>' + row.plateNumber + '</td><td>' + row.dockNumber + '</td><td><span class="badge ' + badgeClass + '">' + row.direction + '</span></td><td style="color: var(--text-muted); font-size:0.85rem;">' + row.securityName + '</td>';
                tbody.appendChild(tr);
            });
        };

        function fetchLogs() {
            const oldScript = document.getElementById('jsonp-fetcher');
            if(oldScript) oldScript.remove();
            
            const script = document.createElement('script');
            script.id = 'jsonp-fetcher';
            script.src = API_URL + "?callback=handleLogsResponse&prefix=handleLogsResponse&_" + new Date().getTime();
            script.onerror = function() {
                document.getElementById('liveFeedBody').innerHTML = '<tr><td colspan="5" style="text-align: center; color: #ef4444; font-weight: bold;">⚠️ Database Connection Offline. Check Apps Script code setup.</td></tr>';
            };
            document.body.appendChild(script);
        }

        document.getElementById('entryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerText = "Processing...";
            submitBtn.disabled = true;
            const payload = {
                driverName: document.getElementById('driverName').value,
                plateNumber: document.getElementById('plateNumber').value,
                securityName: document.getElementById('securityName').value,
                dockNumber: document.getElementById('dockNumber').value,
                direction: document.getElementById('direction').value
            };
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                document.getElementById('entryForm').reset();
                document.getElementById('iqamaStatus').innerHTML = "Ready to scan driver card";
                document.getElementById('iqamaStatus').style.color = "var(--text-muted)";
                document.getElementById('plateStatus').innerHTML = "Ready to scan back bumper plate";
                document.getElementById('plateStatus').style.color = "var(--text-muted)";
                document.getElementById('officerStatus').innerHTML = "Ready to scan staff badge";
                document.getElementById('officerStatus').style.color = "var(--text-muted)";
                submitBtn.innerText = "Submit Log";
                submitBtn.disabled = false;
                setTimeout(fetchLogs, 1500);
            } catch (error) {
                alert("Error saving log. Check your setup.");
                submitBtn.innerText = "Submit Log";
                submitBtn.disabled = false;
            }
        });

        setInterval(fetchLogs, 15000);
        fetchLogs();
    </script>
</body>
</html>
